name: Release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      dry_run:
        description: Run the release pipeline without publishing to npm
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package quality
        run: npm run check

      - name: Verify published tarball
        run: npm run pack:check

      - name: Smoke test packed consumer install
        run: npm run smoke:consumer

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run completed. Package was not published."
