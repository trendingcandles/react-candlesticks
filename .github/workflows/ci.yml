name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.19.0
          - 24
        react-version:
          - 18
          - 19
    permissions:
      contents: write  # elevated from read — required to push badge commits
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Switch to React ${{ matrix.react-version }}
        if: matrix.react-version == '19'
        run: npm install --no-save react@19 react-dom@19 @types/react@19 @types/react-dom@19

      - name: Check types
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run consumer smoke test
        if: matrix.node-version == '24' && matrix.react-version == '18'
        run: npm run smoke:consumer

      - name: Generate coverage badges
        run: node ./scripts/generate-coverage-badges.mjs
        if: github.event_name == 'push' && matrix.node-version == '24' && matrix.react-version == '18' && !endsWith(github.actor, '[bot]')

      - name: Upload coverage badges artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && matrix.node-version == '24' && matrix.react-version == '18' && !endsWith(github.actor, '[bot]')
        with:
          name: coverage-badges
          path: badges/coverage-*.svg
