title: "[Feature Request] "
labels:
  - feature-request
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: Describe the pain point or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: Describe the feature and expected behavior.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional links, examples, screenshots, or related discussions.
